[package]
name = "fabryk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Fabryk knowledge fabric — umbrella crate re-exporting all components"
exclude = ["assets/"]

[dependencies]
fabryk-core = { version = "0.4.2", path = "../fabryk-core" }
fabryk-auth = { version = "0.4.2", path = "../fabryk-auth" }
fabryk-acl = { version = "0.4.2", path = "../fabryk-acl" }
fabryk-content = { version = "0.4.2", path = "../fabryk-content" }
fabryk-fts = { version = "0.4.2", path = "../fabryk-fts" }
fabryk-graph = { version = "0.4.2", path = "../fabryk-graph" }
fabryk-vector = { version = "0.4.2", path = "../fabryk-vector" }

[features]
default = []
full = ["fts-tantivy", "graph-rkyv-cache", "vector-lancedb", "vector-fastembed"]
fts-tantivy = ["fabryk-fts/fts-tantivy"]
graph-rkyv-cache = ["fabryk-graph/graph-rkyv-cache"]
vector-lancedb = ["fabryk-vector/vector-lancedb"]
vector-fastembed = ["fabryk-vector/vector-fastembed"]
